name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 환경 설정 (Node.js & Java)
      - uses: actions/setup-node@v4
        with:
          node-version: '20' # 가장 안정적인 LTS 버전 사용

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      # 2. 패키지 설치 (안정성을 위해 npm 사용)
      - name: Install dependencies
        run: npm install

      # 3. 웹 빌드 (vite build 실행 -> www 폴더 생성)
      - name: Build web app
        run: npm run build

      # 4. 빌드 결과물 검증
      - name: Verify build output
        run: |
          if [ ! -d "www" ]; then
            echo "Error: 'www' directory not found. Check outDir in vite.config.ts"
            exit 1
          fi
          if [ ! -f "www/index.html" ]; then
            echo "Error: index.html not found in www/"
            exit 1
          fi

      # 5. Capacitor 동기화 (오류 방지를 위해 명시적 npx 사용)
      - name: Capacitor Sync
        run: |
          npx cap --version
          # android 폴더가 없으면 새로 생성
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # 웹 결과물을 안드로이드로 복사 및 동기화
          npx cap copy android
          npx cap sync android

      # 6. 안드로이드 APK 최종 빌드
      - name: Build Android Debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      # 7. 생성된 APK 파일 업로드 (다운로드 가능하게)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shift-calendar-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
